global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: aura-spa-backend-local
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: aura-spa-backend-cloud-run
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - aura-spa-backend-yujwbtz45a-uc.a.run.app
